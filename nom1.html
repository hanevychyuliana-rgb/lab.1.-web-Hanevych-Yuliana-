<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання 1</title>
    <link rel="stylesheet" href="nom1.css">
</head>
<body>

    <header>
        <nav>
            <a href="index.html">Головна</a>
            <a href="nom1.html" class="active"> 1</a>
            <a href="nom2.html">2</a>
            <a href="nom3.html"> 3</a>
        </nav>
    </header>

    <div class="main-container">
        <div class="math-card">
            <h2>Перетворення одиниць довжини</h2>
            <p>Введіть число та оберіть одиниці:</p>

            <div class="input-group">
                <input type="number" id="userInput" placeholder="Введіть значення...">

                <div class="selectors">
                    <select id="unitFrom">
                        <option value="km">Кілометри (км)</option>
                        <option value="m" selected>Метри (м)</option>
                        <option value="dm">Дециметри (дм)</option>
                        <option value="cm">Сантиметри (см)</option>
                        <option value="mm">Міліметри (мм)</option>
                    </select>
                    <span>в</span>
                    <select id="unitTo">
                        <option value="km">Кілометри (км)</option>
                        <option value="m">Метри (м)</option>
                        <option value="dm">Дециметри (дм)</option>
                        <option value="cm" selected>Сантиметри (см)</option>
                        <option value="mm">Міліметри (мм)</option>
                    </select>
                </div>

                <button onclick="run()">Конвертувати</button>
            </div>

            <div id="displayResult" class="result-box">
                результат:
            </div>
        </div>
    </div>

    <script src="nom1.js"></script>
</body>
</html>
